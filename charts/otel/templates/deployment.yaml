apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: deployment
spec:
  mode: deployment
  image: otel/opentelemetry-collector-contrib:latest

  config:
    receivers:
      k8s_cluster:
        auth_type: serviceAccount
        node_conditions_to_report:
          - Ready
          - MemoryPressure
        allocatable_types_to_report:
          - cpu
          - memory
      k8s_events:
        auth_type: serviceAccount
      redis:
        endpoint: {{ .Values.monitoring.redis.endpoint | quote }}
        password: {{ .Values.monitoring.redis.password | quote }}
        collection_interval: 16s
        metrics:
          redis.maxmemory:
            enabled: true
          redis.cmd.latency:
            enabled: true
          redis.db.keys:
            enabled: true
      postgresql:
        endpoint: {{ .Values.monitoring.postgres.endpoint | quote }}
        collection_interval: 16s
        username: {{ .Values.monitoring.postgres.username | quote }}
        password: {{ .Values.monitoring.postgres.password | quote }}
        tls:
          insecure: true
        metrics:
          postgresql.database.locks:
            enabled: true

      {{/* prometheus: */}}
      {{/*   config: */}}
      {{/*     scrape_configs: */}}
      {{/*       - job_name: "valkey-exporter" */}}
      {{/*         scrape_interval: 15s */}}
      {{/*         scrape_timeout: 10s */}}
      {{/*         static_configs: */}}
      {{/*           - targets: ["valkey-metrics.valkey:9121"] */}}
      {{/* k8sobjects: */}}
      {{/*   auth_type: serviceAccount */}}

    processors:
      k8s_attributes:
        auth_type: "serviceAccount"
        pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.hostname
            - k8s.pod.start_time
            - k8s.pod.ip
            - k8s.deployment.name
            - k8s.deployment.uid
            - k8s.replicaset.name
            - k8s.replicaset.uid
            - k8s.daemonset.name
            - k8s.daemonset.uid
            - k8s.statefulset.name
            - k8s.statefulset.uid
            - k8s.job.name
            - k8s.job.uid
            - k8s.cronjob.name
            - k8s.cronjob.uid
            - k8s.node.name
            - k8s.node.uid
            - k8s.cluster.uid
            - k8s.container.name
            - container.id
            - container.image.name
            - container.image.tag
            - container.image.repo_digests
            - service.namespace
            - service.name
            - service.version
            - service.instance.id


      batch: {}

      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 15

      {{ $kube_system_namespace := (lookup "v1" "Namespace" "" "kube-system") }}
      {{ if $kube_system_namespace }}
      transform:
        trace_statements:
          - set(resource.attributes["k8s.cluster.uid"], "{{ $kube_system_namespace.metadata.uid }}")
        metric_statements:
          - set(resource.attributes["k8s.cluster.uid"], "{{ $kube_system_namespace.metadata.uid }}")
        log_statements:
          - set(resource.attributes["k8s.cluster.uid"], "{{ $kube_system_namespace.metadata.uid }}")
      {{ end }}

    exporters:
      debug: {}
      otlp_grpc:
        endpoint: signoz-otel-collector.signoz:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [k8s_cluster, redis, postgresql]
          processors: [memory_limiter, batch, k8s_attributes, transform]
          exporters: [debug, otlp_grpc]
        logs:
          receivers: [k8s_events]
          processors: [memory_limiter, batch, k8s_attributes, transform]
          exporters: [debug, otlp_grpc]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-deployment
rules:
  - apiGroups:
      - ''
    resources:
      - events
      - namespaces
      - namespaces/status
      - nodes
      - nodes/spec
      - pods
      - pods/status
      - replicationcontrollers
      - replicationcontrollers/status
      - resourcequotas
      - services
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions
    resources:
      - daemonsets
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-deployment
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-deployment
subjects:
- kind: ServiceAccount
  name: deployment-collector
  namespace: {{ .Release.Namespace }}
