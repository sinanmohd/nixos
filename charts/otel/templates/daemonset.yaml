apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: daemonset
spec:
  mode: daemonset

  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: hostfs
      hostPath:
        path: /

  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: hostfs
      mountPath: /hostfs
      readOnly: true
      mountPropagation: HostToContainer

  config:
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          # exclude logs from otel-collector operator pods
          - /var/log/pods/*/otc-container/*.log
          # exclude logs from otel-collector regular pods
          - /var/log/pods/*/otel-collectr/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          - type: container
            id: container-parser

      hostmetrics:
        root_path: /hostfs
        collection_interval: 10s
        scrapers:
          cpu: {}
          disk: {}
          load: {}
          filesystem: {}
          memory: {}
          network: {}

      kubeletstats:
        collection_interval: 10s
        auth_type: 'serviceAccount'
        endpoint: '${env:K8S_NODE_NAME}:10250'
        node: '${env:K8S_NODE_NAME}'
        insecure_skip_verify: false
        extra_metadata_labels:
          - container.id
          - k8s.volume.type
        k8s_api_config:
          auth_type: serviceAccount
        metric_groups:
          - node
          - pod
          - container
          - volume
        collect_all_network_interfaces:
          pod: true
          node: true
        metrics:
          k8s.container.cpu.node.utilization:
            enabled: true
          k8s.pod.cpu.node.utilization:
            enabled: true
          k8s.container.memory.node.utilization:
            enabled: true
          k8s.pod.memory.node.utilization:
            enabled: true

    processors:
      k8s_attributes:
        auth_type: "serviceAccount"
        pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.hostname
            - k8s.pod.start_time
            - k8s.pod.ip
            - k8s.deployment.name
            - k8s.deployment.uid
            - k8s.replicaset.name
            - k8s.replicaset.uid
            - k8s.daemonset.name
            - k8s.daemonset.uid
            - k8s.statefulset.name
            - k8s.statefulset.uid
            - k8s.job.name
            - k8s.job.uid
            - k8s.cronjob.name
            - k8s.cronjob.uid
            - k8s.node.name
            - k8s.node.uid
            - k8s.cluster.uid
            - k8s.container.name
            - container.id
            - container.image.name
            - container.image.tag
            - container.image.repo_digests
            - service.namespace
            - service.name
            - service.version
            - service.instance.id

      {{ $kube_system_namespace := (lookup "v1" "Namespace" "" "kube-system") }}
      {{ if $kube_system_namespace }}
      transform:
        trace_statements:
          - set(resource.attributes["k8s.cluster.uid"], "{{ $kube_system_namespace.metadata.uid }}")
        metric_statements:
          - set(resource.attributes["k8s.cluster.uid"], "{{ $kube_system_namespace.metadata.uid }}")
        log_statements:
          - set(resource.attributes["k8s.cluster.uid"], "{{ $kube_system_namespace.metadata.uid }}")
      {{ end }}

      resourcedetection:
        detectors: [env, system, k8snode]

      batch: {}

      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 15

    exporters:
      debug: {}
      otlp_grpc:
        endpoint: signoz-otel-collector.signoz:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [kubeletstats, hostmetrics]
          processors: [memory_limiter, batch, resourcedetection, k8s_attributes, transform]
          exporters: [debug, otlp_grpc]
        logs:
          receivers: [filelog]
          processors: [memory_limiter, batch, resourcedetection, k8s_attributes, transform]
          exporters: [debug, otlp_grpc]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-daemonset
rules:
  - apiGroups: [""]
    resources: 
      - nodes/stats
      - nodes
      - pods
      - namespaces
      - deployment
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs:
      - get
      - list
      - watch
  - apiGroups: [""]
    resources: ["nodes/pods"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-daemonset
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-daemonset
subjects:
- kind: ServiceAccount
  name: daemonset-collector
  namespace: {{ .Release.Namespace }}
