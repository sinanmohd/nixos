apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: {{ .Release.Name }}-clickhouse
spec:
  configuration:
    users:
      default/networks/ip:
        - "::/0"
    zookeeper:
      nodes:
        - host: zookeeper.zookeeper
          port: 2181
    clusters:
      - name: cluster
        layout:
          shardsCount: 1
          replicasCount: {{ .Values.replicaCount }}
        templates:
          podTemplate: clickhouse-pod
          volumeClaimTemplate: clickhouse-storage

  templates:
    podTemplates:
      - name: clickhouse-pod
        spec:
          containers:
            - name: clickhouse
              image: {{ .Values.image }}

    volumeClaimTemplates:
      - name: clickhouse-storage
        reclaimPolicy: {{ .Values.reclaimPolicy | required "A valid reclaimPolicy is required" | quote }}
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: {{ .Values.size | required "A valid size is required" | quote }}
          {{- if .Values.storageClass }}
          storageClassName: {{ .Values.storageClass | quote }}
          {{- end }}
