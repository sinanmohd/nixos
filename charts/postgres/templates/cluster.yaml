apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  instances: {{ .Values.instances }}
  imageName: ghcr.io/cloudnative-pg/postgresql:17.9
  storage:
    {{- if .Values.storageClass }}
    storageClass: {{ .Values.storageClass | quote }}
    {{- end }}
    size: {{ .Values.size | required "A valid size is required" | quote }}
  {{- if $.Values.users }}
  managed:
    roles:
    {{- range $.Values.users }}
    - name: {{ .name }}
      ensure: present
      login: true
      superuser: false
      passwordSecret:
        name: "{{ .name }}-cnpg-user"
      {{- if .inRoles }}
      inRoles:
        {{- range .inRoles }}
        - {{ . }}
        {{- end -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
